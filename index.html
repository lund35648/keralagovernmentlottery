<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kerala Lucky Draw 2026</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#fff0f5,#ffe6f0);
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
padding:10px;
overflow-x:hidden;
}
.container{
width:100%;
max-width:400px;
background:#fff;
padding:16px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}
.heroBox{
background:linear-gradient(135deg,#ff4f79,#ff758c);
color:#fff;
padding:14px;
border-radius:12px;
text-align:center;
margin-bottom:10px;
}
.timerBox{
background:#fff3cd;
color:#856404;
padding:8px;
border-radius:8px;
text-align:center;
font-weight:bold;
margin-bottom:8px;
transition:.3s;
}
.timerBox.danger{
background:#ffdddd;
color:#b30000;
animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:.5;}}

.ticketAmount{
background:#e8f5e9;
color:#1b5e20;
padding:6px;
border-radius:8px;
text-align:center;
font-weight:bold;
margin-bottom:6px;
font-size:13px;
}

input,select,button{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:13px;
}
select[multiple]{height:90px;}

.tag{
display:inline-block;
padding:6px 10px;
border-radius:20px;
margin:4px 4px 0 0;
font-size:12px;
font-weight:bold;
}
.tag span{
margin-left:6px;
cursor:pointer;
color:red;
}
.paid{background:#ffd6e0;color:#c2185b;}
.free{background:#d0f0ff;color:#006064;}

button{
background:linear-gradient(90deg,#ff1744,#d50000);
color:#fff;
border:none;
font-weight:bold;
cursor:pointer;
}
button:disabled{opacity:.5;}

#livePopup{
position:fixed;
bottom:80px;
left:10px;
right:10px;
max-width:330px;
margin:auto;
background:#fff;
padding:12px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
display:none;
font-size:13px;
z-index:9999;
}
#livePopup.show{
display:block;
animation:fadeIn .5s;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
.liveName{font-weight:bold;color:#0b6b3a;}

#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
z-index:10000;
}
#modalContent{
background:#fff;
padding:20px;
border-radius:16px;
text-align:center;
width:90%;
max-width:320px;
animation:pop .4s ease;
}
@keyframes pop{
from{transform:scale(.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
}
@keyframes fall{
to{transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>

<body>
<div class="container">

<div class="heroBox">
<h2>🎉 Kerala Lucky Draw 2026</h2>
<p>🔥 Buy 2 Get 1 FREE Offer 🔥</p>
</div>

<div class="timerBox" id="timerBox">
⏳ Offer closes in: <span id="countdown">20:00</span>
</div>

<input id="name" placeholder="Full Name">
<input id="mobile" placeholder="Mobile Number">

<div class="ticketAmount" id="ticketAmount">
💰 Select tickets
</div>

<select id="ticket" multiple></select>
<div id="selectedTickets"></div>

<input id="amount" placeholder="Total Amount (₹)" readonly>
<button id="submitBtn" disabled>Submit & Continue</button>

</div>

<div id="livePopup"><div id="liveText"></div></div>

<div id="modal">
<div id="modalContent">
<h2 style="color:#ff1744;">🎉 Ticket Added Successfully!</h2>
<p id="luckyText"></p>
<button onclick="closeModal()">Continue</button>
</div>
</div>

<script>
const TICKET_PRICE=149;
const WHATSAPP_NUMBER="918298558752";

const ticket=document.getElementById("ticket");
const amount=document.getElementById("amount");
const submitBtn=document.getElementById("submitBtn");
const nameI=document.getElementById("name");
const mobileI=document.getElementById("mobile");
const selectedDiv=document.getElementById("selectedTickets");
const ticketAmount=document.getElementById("ticketAmount");

let generatedFreeTickets=[];
let hasCelebrated=false;

for(let i=0;i<500;i++){
 let n=("000000"+Math.floor(Math.random()*999999)).slice(-6);
 let o=document.createElement("option");
 o.value="KL"+n;
 o.textContent="KL"+n;
 ticket.appendChild(o);
}

function refresh(){
 let sel=[...ticket.selectedOptions];
 selectedDiv.innerHTML="";
 generatedFreeTickets=[];

 let paid=sel.length;
 let free=Math.floor(paid/2);
 let total=paid*TICKET_PRICE;
 let totalTickets=paid+free;

 if(paid>=1){
   amount.value="₹ "+total;
   ticketAmount.textContent=
   "Paid: "+paid+" | Free: "+free+
   " | Total: "+totalTickets+
   " | Amount: ₹ "+total;

   if(!hasCelebrated){
     showCelebration(sel[0].value);
     hasCelebrated=true;
   }
 }else{
   amount.value="";
   ticketAmount.textContent="💰 Select tickets";
   hasCelebrated=false;
 }

 sel.forEach(option=>{
   let tag=document.createElement("div");
   tag.className="tag paid";
   tag.innerHTML="🎟 "+option.value+" (Paid) <span>✖</span>";
   tag.querySelector("span").onclick=()=>{
     option.selected=false;
     refresh();
   };
   selectedDiv.appendChild(tag);
 });

 for(let i=0;i<free;i++){
   let freeTicket="KL"+("000000"+Math.floor(Math.random()*999999)).slice(-6);
   generatedFreeTickets.push(freeTicket);

   let tag=document.createElement("div");
   tag.className="tag free";
   tag.innerHTML="🎁 "+freeTicket+" (Free)";
   selectedDiv.appendChild(tag);
 }

 submitBtn.disabled=!(paid>=1 && nameI.value.trim() && mobileI.value.length>=10);
}

ticket.addEventListener("change",refresh);
nameI.addEventListener("input",refresh);
mobileI.addEventListener("input",e=>{
 e.target.value=e.target.value.replace(/\D/g,'');
 refresh();
});

submitBtn.addEventListener("click",function(){
 let sel=[...ticket.selectedOptions];
 let paidTickets=sel.length;
 let freeCount=Math.floor(paidTickets/2);
 let totalTickets=paidTickets+freeCount;

 let paidList=sel.map(o=>o.value).join(", ");
 let freeList=generatedFreeTickets.join(", ");

 let msg=`New Booking
Name: ${nameI.value}
Mobile: ${mobileI.value}

Paid Tickets (${paidTickets}):
${paidList}

Free Tickets (${freeCount}):
${freeList}

Total Tickets: ${totalTickets}
Amount: ₹ ${paidTickets*TICKET_PRICE}`;

 window.open("https://wa.me/"+WHATSAPP_NUMBER+"?text="+encodeURIComponent(msg),"_blank");
});

function showCelebration(ticketNumber){
 document.getElementById("luckyText").innerHTML=
 "Your Selected Ticket: <b>"+ticketNumber+"</b><br>Best of Luck!";
 document.getElementById("modal").style.display="flex";

 for(let i=0;i<60;i++){
   let c=document.createElement("div");
   c.className="confetti";
   c.style.left=Math.random()*100+"vw";
   c.style.backgroundColor="hsl("+Math.random()*360+",100%,50%)";
   document.body.appendChild(c);
   setTimeout(()=>c.remove(),3000);
 }
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

let totalSeconds=20*60;
const countdown=document.getElementById("countdown");
const timerBox=document.getElementById("timerBox");

const timer=setInterval(()=>{
 totalSeconds--;
 let m=Math.floor(totalSeconds/60);
 let s=totalSeconds%60;
 countdown.textContent=
 (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

 if(totalSeconds<=120){
   timerBox.classList.add("danger");
 }

 if(totalSeconds<=0){
   clearInterval(timer);
   submitBtn.disabled=true;
   alert("⚠️ Offer Closed!");
 }
},1000);

/* 50+ Karnataka Names */
const names=[
"Manjunath","Shivakumar","Raghavendra","Basavaraj","Mahesh","Prakash","Siddappa","Hanumanth","Nagaraj","Ramesh",
"Suresh","Girish","Venkatesh","Santosh","Rohith","Darshan","Yash","Ganesh","Harsha","Tejas",
"Karthik","Arjun","Naveen","Lokesh","Deepak","Shankar","Mallikarjun","Channappa","Ravi","Umesh",
"Anil","Dinesh","Vijay","Raghu","Vinay","Shwetha","Divya","Aishwarya","Pooja","Nandini",
"Meghana","Lakshmi","Soumya","Tejaswini","Keerthi","Anjali","Priya","Bhavana","Kavya","Sneha",
"Chaitra","Shruthi","Preethi","Ranjitha","Varsha"
];

const cities=[
"Bengaluru","Mysuru","Hubballi","Mangaluru","Belagavi",
"Shivamogga","Tumakuru","Davangere","Udupi","Ballari",
"Hassan","Mandya","Kolar","Chikkamagaluru","Vijayapura"
];

function maskMobile(){
 return "9"+Math.floor(100+Math.random()*900)+"****"+Math.floor(10+Math.random()*90);
}

function showLive(){
 let n=names[Math.floor(Math.random()*names.length)];
 let c=cities[Math.floor(Math.random()*cities.length)];
 let m=maskMobile();
 let t=Math.floor(Math.random()*5)+1;

 document.getElementById("liveText").innerHTML=
 "<span class='liveName'>"+n+"</span> ("+m+") from "+c+
 " just booked "+t+" tickets 🎟🔥";

 let p=document.getElementById("livePopup");
 p.classList.add("show");
 setTimeout(()=>p.classList.remove("show"),2000);
}

setTimeout(showLive,3000);
setInterval(showLive,4000);
</script>

</body>
</html>
